name: Decompile ARM Libraries (ARMv7 + AArch64)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - name: armv7
            processor: ARM:LE:32:v7
            lib: libgame-arm32.so
            output: output_v7
            analysis_timeout: 3600
            decompile_timeout: 60

          - name: aarch64
            processor: AARCH64:LE:64:v8A
            lib: libgame-arm64.so
            output: output_aarch64
            analysis_timeout: 7200
            decompile_timeout: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies for Ghidra Native Build
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential gcc g++ make

      - name: Download and Setup Ghidra 11.0.3
        run: |
          echo "📥 Baixando Ghidra 11.0.3..."
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.0.3_build/ghidra_11.0.3_PUBLIC_20240410.zip
          unzip -q ghidra_11.0.3_PUBLIC_20240410.zip
          
          GHIDRA_DIR="ghidra_11.0.3_PUBLIC"
          
          # Permissões básicas
          chmod +x "$GHIDRA_DIR/support/analyzeHeadless"
          
          # === VERIFICAR ESTRUTURA GHIDRA ===
          echo "📋 Verificando estrutura do Ghidra..."
          ls -la "$GHIDRA_DIR/support/" | head -10 || echo "Support dir não encontrado"
          
          echo "✅ Ghidra 11.0.3 pronto para uso."

      - name: Decompile ${{ matrix.arch.name }} Library
        run: |
          GHIDRA_DIR="ghidra_11.0.3_PUBLIC"
          LIB_PATH="./libs/${{ matrix.arch.lib }}"
          OUTPUT_PATH="./${{ matrix.arch.output }}"
          PROJECT_DIR="./ghidra_projects"
          PROJECT_NAME="project_${{ matrix.arch.name }}"
          
          mkdir -p "$OUTPUT_PATH"
          mkdir -p "$PROJECT_DIR"
          
          echo "🚀 Iniciando decompilação para ${{ matrix.arch.name }}"
          echo "   Library: $LIB_PATH"
          echo "   Processor: ${{ matrix.arch.processor }}"
          echo "   Timeout análise: ${{ matrix.arch.analysis_timeout }}s"
          echo "   Timeout decompilação: ${{ matrix.arch.decompile_timeout }}s"
          echo ""
          
          # Executar análise headless com configuração corrigida
          "$GHIDRA_DIR/support/analyzeHeadless" \
            "$PROJECT_DIR" "$PROJECT_NAME" \
            -import "$LIB_PATH" \
            -processor "${{ matrix.arch.processor }}" \
            -scriptPath ./scripts \
            -postScript "${{ matrix.arch.name == 'armv7' && 'DecompileV7.java' || 'Decompile64.java' }}" "$OUTPUT_PATH" "${{ matrix.arch.decompile_timeout }}" \
            -deleteProject \
            -analysisTimeoutPerFile "${{ matrix.arch.analysis_timeout }}" || {
              echo ""
              echo "⚠️  Análise completou (pode ter saída parcial)"
              echo "   Verifique os logs acima para mais detalhes"
            }
          
          # Verificar se foram criados arquivos
          if [ -d "$OUTPUT_PATH" ]; then
            FILE_COUNT=$(find "$OUTPUT_PATH" -type f -name "*.c" 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              echo ""
              echo "✅ Sucesso! $FILE_COUNT arquivos .c gerados em $OUTPUT_PATH"
            else
              echo ""
              echo "⚠️  Nenhum arquivo .c foi gerado em $OUTPUT_PATH"
              echo "   Possíveis causas:"
              echo "   - Scripts Java não encontrados"
              echo "   - Biblioteca não encontrada"
              echo "   - Biblioteca sem funções reconhecíveis"
              echo "   - Timeout na análise"
            fi
          else
            echo ""
            echo "❌ Diretório de saída não foi criado!"
          fi

      - name: Upload Pseudo-C Results (${{ matrix.arch.name }})
        uses: actions/upload-artifact@v4
        with:
          name: pseudo-c-${{ matrix.arch.name }}
          path: ${{ matrix.arch.output }}/
          if-no-files-found: warn
          compression-level: 6

      - name: Upload Project State (Debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghidra-project-${{ matrix.arch.name }}
          path: ghidra_projects/
          if-no-files-found: ignore
          compression-level: 6
