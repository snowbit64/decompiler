name: AArch64 Decompiler Extraction
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  decompile_aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Ghidra
        run: |
          wget https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.0.3_build/ghidra_11.0.3_PUBLIC_20240410.zip
          unzip ghidra_11.0.3_PUBLIC_20240410.zip
          # Garante permissões de execução no script e no descompilador nativo
          chmod +x ghidra_11.0.3_PUBLIC/support/analyzeHeadless
          chmod -R +x ghidra_11.0.3_PUBLIC/Ghidra/Features/Decompiler/os/linux64/

      - name: Execute Ghidra Headless Analysis
        run: |
          LIB_PATH="./libs/libgame-arm64.so" 
          OUTPUT_PATH="./extracted_code"
          mkdir -p $OUTPUT_PATH
          
          ./ghidra_11.0.3_PUBLIC/support/analyzeHeadless \
          ./ghidra_project_64 TempProj64 \
          -import "$LIB_PATH" \
          -processor AArch64:LE:64:v8A \
          -scriptPath ./scripts \
          -postScript Decompile64.java "$OUTPUT_PATH" \
          -deleteProject \
          -analysisTimeoutPerFile 7200

      - name: Upload Pseudo-C Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aarch64-pseudo-c-results
          path: extracted_code/
          